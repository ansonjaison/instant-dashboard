<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Dashboard — Instant Dashboard</title>
    <meta name="description"
        content="Paste your JSON data and describe your desired styling to generate a professional dashboard instantly.">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient-orb bg-gradient-orb--1"></div>
    <div class="bg-gradient-orb bg-gradient-orb--2"></div>

    <nav class="nav" id="main-nav">
        <div class="container">
            <a href="/" class="nav__logo" id="nav-logo">
                <span class="nav__logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                    </svg>
                </span>
                Instant Dashboard
            </a>
            <div class="nav__links">
                <a href="/" class="nav__link" id="nav-home">Home</a>
                <a href="/generate" class="nav__link" id="nav-generate"
                    style="color: var(--text-primary);">Generator</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="generator-layout">
            <aside class="generator-sidebar" id="sidebar">
                <div>
                    <h1 class="heading-md" style="margin-bottom: 4px;">Dashboard Generator</h1>
                    <p style="font-size: 0.82rem; color: var(--text-muted);">Paste JSON data and describe your desired
                        style.</p>
                </div>

                <div class="form-group" id="json-input-group">
                    <label class="form-label" for="json-input">
                        JSON Data <span class="form-label__hint">— your source data</span>
                    </label>
                    <textarea id="json-input" class="form-textarea form-textarea--json"
                        placeholder='{"revenue": 84230, "users": 2847}' spellcheck="false"
                        aria-label="JSON data input"></textarea>
                    <div class="sample-actions">
                        <button class="btn--sample" id="btn-sample-sales" type="button">Sales Data</button>
                        <button class="btn--sample" id="btn-sample-analytics" type="button">Analytics</button>
                        <button class="btn--sample" id="btn-sample-hr" type="button">HR Report</button>
                        <button class="btn--sample" id="btn-sample-clear" type="button">Clear</button>
                    </div>
                </div>

                <div class="form-group" id="prompt-input-group">
                    <label class="form-label" for="prompt-input">
                        Design Prompt <span class="form-label__hint">— how it should look</span>
                    </label>
                    <textarea id="prompt-input" class="form-textarea" style="min-height: 100px;"
                        placeholder="Create a dark-themed dashboard with gradient cards and clean typography."
                        maxlength="500" aria-label="Design prompt input"></textarea>
                    <div class="char-counter" id="char-counter">0 / 500</div>
                </div>

                <div class="error-message" id="error-message" role="alert" aria-live="polite">
                    <span class="error-message__icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                    </span>
                    <span id="error-text"></span>
                </div>

                <button class="btn btn--primary" id="btn-generate" type="button" style="width: 100%;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                    </svg>
                    <span id="btn-generate-text">Generate Dashboard</span>
                    <div class="spinner" id="btn-spinner" style="display: none;"></div>
                </button>

                <button class="btn btn--secondary" id="btn-download" type="button" style="width: 100%; display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Download HTML
                </button>
            </aside>

            <main class="generator-main" id="main-preview">
                <div class="preview-container" id="preview-container" style="position: relative;">
                    <!-- View Toggle Tabs -->
                    <div class="preview-container__toolbar" id="preview-toolbar" style="display: none;">
                        <div class="preview-container__dots">
                            <span class="preview-container__dot preview-container__dot--red"></span>
                            <span class="preview-container__dot preview-container__dot--yellow"></span>
                            <span class="preview-container__dot preview-container__dot--green"></span>
                        </div>
                        <div class="preview-tabs" id="preview-tabs">
                            <button class="preview-tab preview-tab--active" id="tab-code" type="button">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="16 18 22 12 16 6" />
                                    <polyline points="8 6 2 12 8 18" />
                                </svg>
                                Code
                            </button>
                            <button class="preview-tab" id="tab-preview" type="button">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                                    <line x1="8" y1="21" x2="16" y2="21" />
                                    <line x1="12" y1="17" x2="12" y2="21" />
                                </svg>
                                Preview
                            </button>
                        </div>
                        <div class="preview-stats" id="preview-stats">
                            <span class="preview-stats__chars" id="stats-chars">0 chars</span>
                            <span class="preview-stats__status" id="stats-status">
                                <span class="preview-stats__dot preview-stats__dot--streaming" id="stats-dot"></span>
                                <span id="stats-label">Streaming</span>
                            </span>
                        </div>
                    </div>

                    <!-- Placeholder (shown before generation) -->
                    <div class="preview-placeholder" id="preview-placeholder">
                        <div class="preview-placeholder__icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                <line x1="3" y1="9" x2="21" y2="9" />
                                <line x1="9" y1="21" x2="9" y2="9" />
                            </svg>
                        </div>
                        <h2 class="preview-placeholder__title">No Dashboard Yet</h2>
                        <p class="preview-placeholder__text">Paste your JSON data and describe your desired style, then
                            click Generate.</p>
                    </div>

                    <!-- Live Code View (shown during generation) -->
                    <div class="live-code-view" id="live-code-view" style="display: none;">
                        <div class="live-code-view__lines" id="live-code-output"></div>
                    </div>

                    <!-- Dashboard Preview (shown after generation) -->
                    <iframe id="preview-iframe" class="preview-iframe" sandbox="allow-same-origin allow-scripts"
                        title="Dashboard Preview" style="display: none;"></iframe>
                </div>
            </main>
        </div>
    </div>

    <footer class="footer" style="position: relative; z-index: 1;">
        <div class="container">
            <p class="footer__text">Built with
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round"
                    style="display: inline; vertical-align: middle; margin: 0 2px;">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                </svg>
                by Instant Dashboard &middot; Stateless &middot; No data persisted
            </p>
        </div>
    </footer>

    <script type="module" src="/static/js/generator.js"></script>
</body>

</html>
